<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Placement Portal</title>
    <link rel="stylesheet" href="/profile.css">
    <link rel="stylesheet" href="/responsive.css?v=2.3">
</head>

<body>

<div class="container">

    <h1>My Profile</h1>

    <div class="profile-image">

        <img
            id="profileImage"
            src="/uploads/profiles/default.png"
            width="160"
            height="160"
            style="width:160px;
                   height:160px;
                   border-radius:50%;
                   object-fit:cover;
                   border:4px solid #1e3a8a;">

        <br><br>

        <form action="/upload-profile"
              method="POST"
              enctype="multipart/form-data">

            <input
                type="file"
                name="profileImage"
                accept=".png,.jpg,.jpeg"
                required>

            <br><br>

            <button type="submit">
                Upload Profile Photo
            </button>

        </form>

    </div>
<div class="profile-card">

    <h2>👤 Personal Information</h2>

    <div class="form-grid">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" readonly>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" id="phone">
        </div>

        <div class="form-group">
            <label>Branch</label>
            <input type="text" id="branch">
        </div>

        <div class="form-group">
            <label>Semester</label>
            <input type="text" id="semester">
        </div>

        <div class="form-group">
            <label>CGPA</label>
            <input type="number" step="0.01" id="cgpa">
        </div>

        <div class="form-group full-width">
            <label>Skills</label>
            <textarea id="skills"></textarea>
        </div>

        <div class="form-group">
            <label>LinkedIn</label>
            <input type="text" id="linkedin">
        </div>

        <div class="form-group">
            <label>GitHub</label>
            <input type="text" id="github">
        </div>

    </div>

    <div class="stats-row">

        <div class="stat-box">
            <h3 id="tests">0</h3>
            <p>Tests Taken</p>
        </div>

        <div class="stat-box">
            <h3><span id="score">0</span>%</h3>
            <p>Average Score</p>
        </div>

    </div>

    <div class="button-row">

        <button id="saveBtn" onclick="updateProfile()">
            💾 Save Changes
        </button>

        <button onclick="window.location='/dashboard'">
            Dashboard
        </button>

        <button onclick="window.location='/my-applications'">
            Applications
        </button>

        <button onclick="window.location='/resume'">
            Resume
        </button>

    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

async function loadProfile() {

    try {

        const response = await fetch("/user");

        if (!response.ok) {
            window.location.href = "/login";
            return;
        }

        const user = await response.json();

        document.getElementById("name").value = user.name || "";
        document.getElementById("email").value = user.email || "";
        document.getElementById("phone").value = user.phone || "";
        document.getElementById("branch").value = user.branch || "";
        document.getElementById("semester").value = user.semester || "";
        document.getElementById("cgpa").value = user.cgpa || "";
        document.getElementById("skills").value = user.skills || "";
        document.getElementById("linkedin").value = user.linkedin || "";
        document.getElementById("github").value = user.github || "";

        document.getElementById("tests").innerText = user.testsTaken || 0;
        document.getElementById("score").innerText = user.averageScore || 0;

        const img = document.getElementById("profileImage");
        let profileSrc = "/uploads/profiles/default.png";
        if (user.profileImage && user.profileImage !== "default.png") {
            if (user.profileImage.startsWith("http") || user.profileImage.startsWith("/")) {
                profileSrc = user.profileImage;
            } else {
                profileSrc = "/uploads/profiles/" + user.profileImage;
            }
        }
        img.src = profileSrc + "?t=" + Date.now();

        img.onerror = function () {
            this.src = "/uploads/profiles/default.png";
        };

    }

    catch (err) {

        console.log(err);

    }

}

async function updateProfile() {
    const phone = document.getElementById("phone").value.trim();
    if (phone !== "" && !/^\d{10}$/.test(phone)) {
        Swal.fire({
            icon: "warning",
            title: "Invalid Contact Number",
            text: "Contact number must be exactly 10 digits."
        });
        return;
    }

    const response = await fetch("/update-profile", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({

            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            branch: document.getElementById("branch").value,
            semester: document.getElementById("semester").value,
            cgpa: document.getElementById("cgpa").value,
            skills: document.getElementById("skills").value,
            linkedin: document.getElementById("linkedin").value,
            github: document.getElementById("github").value

        })

    });

    const msg = await response.text();

    if (response.ok) {

        Swal.fire({

            icon: "success",
            title: "Success",
            text: msg

        });

        loadProfile();

    }

    else {

        Swal.fire({

            icon: "error",
            title: "Error",
            text: msg

        });

    }

}

loadProfile();

</script>

    <script src="/responsive.js?v=2.3"></script>
</body>

</html>
