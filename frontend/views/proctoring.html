<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proctoring Monitor | Admin Console</title>
    <link rel="stylesheet" href="/dashboard.css">
    <link rel="stylesheet" href="/admin-dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/responsive.css?v=2.0?v=2.0">
    <style>
        .severity-badge {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
            display: inline-block;
        }
        .severity-high {
            background: #fee2e2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }
        .severity-medium {
            background: #fef3c7;
            color: #d97706;
            border: 1px solid #fde68a;
        }
        .severity-low {
            background: #eff6ff;
            color: #2563eb;
            border: 1px solid #bfdbfe;
        }
        .proctor-alert-box {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 14px;
            margin-top: 10px;
        }
        .ai-badge {
            background: #e0f2fe;
            color: #0369a1;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 6px;
        }
        
        .mobile-card {
            display: none;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
        }
        .mobile-card-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .mobile-card-row:last-child {
            margin-bottom: 0;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            margin-top: 12px;
        }
        .mobile-label {
            font-weight: 600;
            color: var(--text-muted);
        }
        .mobile-val {
            color: var(--text-main);
            text-align: right;
        }

        @media (max-width: 768px) {
            .table-container {
                display: none !important;
            }
            .mobile-card {
                display: block;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">🚀 Placement Portal</div>
        <ul>
            <li><a href="/admin-dashboard">Dashboard</a></li>
            <li><a href="/students">Students</a></li>
            <li><a href="/applications">Applications</a></li>
            <li><a href="/proctoring" class="active">Proctoring</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>

    <div class="container" style="max-width: 1200px; padding: 40px 20px;">
        <div class="page-header" style="margin-bottom: 30px;">
            <div>
                <h1 style="font-size: 28px; font-weight: 700; color: var(--primary);">🛡️ Proctoring Monitor</h1>
                <p style="color: var(--text-muted);">Real-time security log tracking student assessments for potential cheating violations.</p>
            </div>
        </div>

        <!-- Desktop Log Table -->
        <div class="table-container card" style="padding: 0; overflow: hidden; border-radius: 12px;">
            <table class="students-table" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                        <th style="padding: 16px; text-align: left; font-weight: 600;">Student</th>
                        <th style="padding: 16px; text-align: left; font-weight: 600;">Assessment</th>
                        <th style="padding: 16px; text-align: left; font-weight: 600;">Incident Type</th>
                        <th style="padding: 16px; text-align: left; font-weight: 600;">Proctoring Details</th>
                        <th style="padding: 16px; text-align: left; font-weight: 600;">Timestamp</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 30px; color: var(--text-muted);">Loading logs...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Mobile Log Cards -->
        <div id="mobileCardsContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        async function loadLogs() {
            try {
                const res = await fetch("/proctoring-data");
                if (!res.ok) {
                    if (res.status === 401) window.location = "/admin-login";
                    return;
                }
                const logs = await res.json();
                renderLogs(logs);
            } catch (err) {
                console.error(err);
            }
        }

        function renderLogs(logs) {
            const tableBody = document.getElementById("logsTableBody");
            const mobileContainer = document.getElementById("mobileCardsContainer");
            
            tableBody.innerHTML = "";
            mobileContainer.innerHTML = "";

            if (logs.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:32px; color:var(--text-muted);">No proctoring alerts reported. All assessments completed securely.</td></tr>`;
                mobileContainer.innerHTML = `<div style="text-align:center; padding:32px; color:var(--text-muted);">No proctoring alerts reported.</div>`;
                return;
            }

            logs.forEach(log => {
                const name = log.userId ? log.userId.name : "Unknown Student";
                const email = log.userId ? log.userId.email : "N/A";
                const date = new Date(log.createdAt).toLocaleString();
                
                let severityClass = "severity-low";
                if (log.incidentType === "Tab Switch" || log.incidentType === "Screenshot Attempt") {
                    severityClass = "severity-high";
                } else if (log.incidentType === "Copy Action" || log.incidentType === "Exit Fullscreen") {
                    severityClass = "severity-medium";
                }

                // Desktop row
                const tr = document.createElement("tr");
                tr.style.borderBottom = "1px solid #e2e8f0";
                tr.innerHTML = `
                    <td style="padding: 16px;">
                        <div style="font-weight:600; color:var(--text-main);">${name}</div>
                        <div style="font-size:12px; color:var(--text-muted);">${email}</div>
                    </td>
                    <td style="padding: 16px; font-weight:500;">${log.testType}</td>
                    <td style="padding: 16px;">
                        <span class="severity-badge ${severityClass}">${log.incidentType}</span>
                    </td>
                    <td style="padding: 16px; max-width: 400px; white-space: normal; line-height: 1.5;">
                        <div style="font-weight: 500; color: #334155; margin-bottom: 6px;">${log.details}</div>
                        <div class="proctor-alert-box">
                            <span class="ai-badge">🛡️ AI Proctor Analysis</span>
                            <div style="font-size:12px; color:#475569; font-weight: 500;">${log.aiAnalysis || "No analysis details generated."}</div>
                        </div>
                    </td>
                    <td style="padding: 16px; color:var(--text-muted); font-size:13px;">${date}</td>
                `;
                tableBody.appendChild(tr);

                // Mobile card
                const card = document.createElement("div");
                card.className = "mobile-card";
                card.innerHTML = `
                    <div class="mobile-card-row">
                        <span class="mobile-label">Student</span>
                        <span class="mobile-val" style="font-weight:600;">${name}<br><small style="color:var(--text-muted);">${email}</small></span>
                    </div>
                    <div class="mobile-card-row">
                        <span class="mobile-label">Assessment</span>
                        <span class="mobile-val">${log.testType}</span>
                    </div>
                    <div class="mobile-card-row">
                        <span class="mobile-label">Incident</span>
                        <span class="mobile-val"><span class="severity-badge ${severityClass}">${log.incidentType}</span></span>
                    </div>
                    <div class="mobile-card-row" style="flex-direction:column; gap:6px;">
                        <span class="mobile-label">Details</span>
                        <span class="mobile-val" style="text-align:left; font-size:12px;">${log.details}</span>
                    </div>
                    <div class="proctor-alert-box" style="margin-top:8px;">
                        <span class="ai-badge">🛡️ AI Proctor Analysis</span>
                        <div style="font-size:12px; color:#475569; font-weight:500; text-align:left;">${log.aiAnalysis || "No analysis details."}</div>
                    </div>
                    <div class="mobile-card-row" style="border-top:1px solid var(--border); padding-top:12px; margin-top:12px;">
                        <span class="mobile-label">Logged At</span>
                        <span class="mobile-val" style="font-size:12px; color:var(--text-muted);">${date}</span>
                    </div>
                `;
                mobileContainer.appendChild(card);
            });
        }

        window.onload = loadLogs;
    </script>
    <script src="/responsive.js?v=2.0?v=2.0"></script>
</body>
</html>
