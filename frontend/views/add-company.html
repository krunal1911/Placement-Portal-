<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Placement Drive | Admin Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard.css?v=2.3">
    <link rel="stylesheet" href="/admin-dashboard.css?v=2.3">
    <link rel="stylesheet" href="/responsive.css?v=2.3">
</head>
<body>

<!-- Navigation Bar -->
<nav>
    <div class="logo">
        🚀 Placement Portal
    </div>
    <ul>
        <li><a href="/admin-dashboard">Dashboard</a></li>
        <li><a href="/students">Students</a></li>
        <li><a href="/applications">Applications</a></li>
        <li><a href="/proctoring">Proctoring</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</nav>

<div class="container" style="max-width: 700px; margin: 40px auto; padding: 0 20px;">
    <div style="margin-bottom: 24px; text-align: center;">
        <h1 style="font-size: 28px; font-weight: 700; color: var(--text-main);">➕ Add Placement Drive</h1>
        <p style="color: var(--text-muted); font-size: 14px;">Register a new company and job profile for students to apply.</p>
    </div>

    <div class="form-card">
        <form id="addCompanyForm">
            <div class="form-group">
                <label for="companyName">Company Name</label>
                <input type="text" id="companyName" placeholder="e.g. Google" required>
            </div>

            <div class="form-group">
                <label for="jobRole">Job Role / Profile</label>
                <input type="text" id="jobRole" placeholder="e.g. Associate Software Engineer" required>
            </div>

            <div class="form-row" style="display: flex; gap: 16px; flex-wrap: wrap;">
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label for="package">Salary Package (LPA)</label>
                    <input type="text" id="package" placeholder="e.g. 12 LPA" required>
                </div>
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label for="location">Job Location</label>
                    <input type="text" id="location" placeholder="e.g. Bangalore / Remote" required>
                </div>
            </div>

            <div class="form-row" style="display: flex; gap: 16px; flex-wrap: wrap;">
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label for="eligibility">Eligibility Criteria (Min CGPA)</label>
                    <input type="number" id="eligibility" step="0.01" min="0" max="10" placeholder="e.g. 7.5" required>
                </div>
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label for="deadline">Application Deadline</label>
                    <input type="date" id="deadline" required>
                </div>
            </div>

            <div style="display: flex; gap: 16px; margin-top: 10px;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Add Company</button>
                <a href="/admin-dashboard" class="btn btn-secondary" style="flex: 1; text-decoration: none; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/responsive.js?v=2.3"></script>
<script>
async function checkAdminProfile() {
    try {
        const res = await fetch("/current-admin");
        if (res.ok) {
            const admin = await res.json();
            if (admin.role !== "superadmin") {
                const compInput = document.getElementById("companyName");
                compInput.value = admin.companyName || "";
                compInput.readOnly = true;
                compInput.style.opacity = "0.7";
                compInput.style.cursor = "not-allowed";
            }
        }
    } catch (e) {
        console.error("Failed to load admin profile:", e);
    }
}
checkAdminProfile();

document.getElementById("addCompanyForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const companyData = {
        companyName: document.getElementById("companyName").value,
        jobRole: document.getElementById("jobRole").value,
        package: document.getElementById("package").value,
        location: document.getElementById("location").value,
        eligibility: parseFloat(document.getElementById("eligibility").value),
        deadline: document.getElementById("deadline").value
    };

    try {
        const response = await fetch("/add-company", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(companyData)
        });

        const data = await response.json();

        if (response.ok) {
            Swal.fire({
                title: "Success!",
                text: "Placement drive registered successfully!",
                icon: "success"
            }).then(() => {
                window.location.href = "/admin-dashboard";
            });
        } else {
            Swal.fire({
                title: "Error!",
                text: data.message || "Failed to add company",
                icon: "error"
            });
        }
    } catch (error) {
        console.error("Error submitting form:", error);
        Swal.fire({
            title: "Error!",
            text: "Something went wrong while connecting to the server.",
            icon: "error"
        });
    }
});
</script>
</body>
</html>
