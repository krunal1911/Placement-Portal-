<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Students | Admin Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard.css?v=2.3">
    <link rel="stylesheet" href="/admin-dashboard.css?v=2.3">
    <link rel="stylesheet" href="/responsive.css?v=2.3">
</head>
<body>

<!-- Navigation Bar -->
<nav>
    <div class="logo">
        🚀 Placement Portal
    </div>
    <ul>
        <li><a href="/admin-dashboard">Dashboard</a></li>
        <li><a href="/students">Students</a></li>
        <li><a href="/applications">Applications</a></li>
        <li><a href="/proctoring">Proctoring</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</nav>

<div class="container">
    <div style="margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
        <div>
            <a href="/admin-dashboard" style="text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 500;">← Back to Dashboard</a>
            <h1 style="font-size: 28px; font-weight: 700; color: var(--text-main); margin-top: 8px;">👨‍🎓 Registered Students</h1>
            <p style="color: var(--text-muted); font-size: 14px;">View, filter, and export registered student records.</p>
        </div>
        <div>
            <a href="/export-students" class="btn btn-success" style="text-decoration: none;">📊 Export to Excel</a>
        </div>
    </div>

    <!-- Filters Control Bar -->
    <div class="card" style="margin-bottom: 30px; text-align: left; display: flex; flex-wrap: wrap; gap: 16px; align-items: center; padding: 20px;">
        <div style="flex: 2; min-width: 200px;">
            <label style="font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px;">Search Keyword</label>
            <input type="text" id="search" placeholder="Search by name or email..." onkeyup="filterStudents()" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--bg-card); color: var(--text-main);">
        </div>

        <div style="flex: 1; min-width: 150px;">
            <label style="font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px;">Engineering Branch</label>
            <select id="branch" onchange="filterStudents()" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--bg-card); color: var(--text-main);">
                <option value="">All Branches</option>
                <option>Computer Engineering</option>
                <option>Information Technology</option>
                <option>Mechanical Engineering</option>
                <option>Civil Engineering</option>
                <option>Electrical Engineering</option>
            </select>
        </div>

        <div style="flex: 1; min-width: 120px;">
            <label style="font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px;">Semester</label>
            <select id="semester" onchange="filterStudents()" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--bg-card); color: var(--text-main);">
                <option value="">All Semesters</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>7</option>
                <option>8</option>
            </select>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn btn-secondary" onclick="resetFilters()" style="padding: 11px 20px; font-size: 13px;">Reset Filters</button>
        </div>
    </div>

    <!-- Students Data Table -->
    <div style="background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; box-shadow: var(--shadow-sm);">
        <table style="margin: 0; border: none; box-shadow: none;">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Branch</th>
                    <th>Semester</th>
                    <th>Tests Taken</th>
                    <th>Average Score</th>
                    <th style="text-align: center;">Action</th>
                </tr>
            </thead>
            <tbody id="studentTable">
                <tr>
                    <td colspan="7" style="text-align: center; color: var(--text-muted);">Loading students list...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/responsive.js?v=2.3"></script>
<script>
let students = [];

async function loadStudents() {
    try {
        const response = await fetch("/students-data");
        if (!response.ok) throw new Error("Unauthorized");
        students = await response.json();
        displayStudents(students);
    } catch (e) {
        console.error(e);
        document.getElementById("studentTable").innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">Failed to load student records.</td></tr>';
    }
}

function displayStudents(data) {
    let html = "";
    if (data.length === 0) {
        html = `<tr><td colspan="7" style="text-align:center; color:var(--text-muted);">No student records match the filter criteria.</td></tr>`;
    } else {
        data.forEach(student => {
            html += `
                <tr>
                    <td style="font-weight: 500;">${student.name}</td>
                    <td>${student.email}</td>
                    <td>${student.branch}</td>
                    <td style="text-align: center;">${student.semester}</td>
                    <td style="text-align: center;">${student.testsTaken || 0}</td>
                    <td style="font-weight: 600; color: var(--primary);">${student.averageScore || 0}%</td>
                    <td style="text-align: center;">
                        <button onclick="deleteStudentAccount('${student._id}', '${student.name}')" class="btn" style="padding: 6px 12px; font-size: 11px; background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; font-weight: 600; cursor: pointer; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px;">🗑️ Delete Account</button>
                    </td>
                </tr>
            `;
        });
    }
    document.getElementById("studentTable").innerHTML = html;
}

async function deleteStudentAccount(id, name) {
    const result = await Swal.fire({
        title: "Delete Student Account?",
        text: `Are you sure you want to permanently delete "${name}" and ALL their history (test records, applications, notifications, proctoring logs)?`,
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#ef4444",
        confirmButtonText: "Yes, Delete Permanently!"
    });

    if (result.isConfirmed) {
        try {
            const response = await fetch(`/delete-student/${id}`, { method: "DELETE" });
            const data = await response.json();
            if (response.ok) {
                Swal.fire("Deleted!", data.message || "Student account removed.", "success")
                    .then(() => loadStudents());
            } else {
                Swal.fire("Error", data.message || "Failed to delete student account.", "error");
            }
        } catch (e) {
            Swal.fire("Error", "Server error while deleting student account.", "error");
        }
    }
}

function filterStudents() {
    const searchVal = document.getElementById("search").value.toLowerCase();
    const branchVal = document.getElementById("branch").value;
    const semVal = document.getElementById("semester").value;

    const filtered = students.filter(student => {
        const matchesSearch = (student.name && student.name.toLowerCase().includes(searchVal)) ||
                              (student.email && student.email.toLowerCase().includes(searchVal));
        const matchesBranch = !branchVal || student.branch === branchVal;
        const matchesSem = !semVal || String(student.semester) === String(semVal);

        return matchesSearch && matchesBranch && matchesSem;
    });

    displayStudents(filtered);
}

function resetFilters() {
    document.getElementById("search").value = "";
    document.getElementById("branch").value = "";
    document.getElementById("semester").value = "";
    displayStudents(students);
}

loadStudents();
</script>
</body>
</html>
