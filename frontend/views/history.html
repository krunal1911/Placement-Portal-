<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test History | Placement Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard.css?v=2.3">
    <link rel="stylesheet" href="/responsive.css?v=2.3">
</head>
<body>

<nav>
    <div class="logo">🚀 Placement Portal</div>
    <ul>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="/leaderboard">Leaderboard</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</nav>

<div class="container" style="max-width: 1000px; margin: 40px auto; padding: 0 20px;">
    <div style="margin-bottom: 24px; text-align: left;">
        <a href="/dashboard" style="text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 500;">← Back to Dashboard</a>
        <h1 style="font-size: 28px; font-weight: 700; color: var(--text-main); margin-top: 8px;">📊 Assessment Performance History</h1>
        <p style="color: var(--text-muted); font-size: 14px;">Review all your completed test scores, question counts, and percentages.</p>
    </div>

    <div style="background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; box-shadow: var(--shadow-sm); margin-bottom: 30px;">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Score</th>
                    <th>Total Questions</th>
                    <th>Percentage</th>
                    <th>Date Completed</th>
                </tr>
            </thead>
            <tbody id="historyTable">
                <tr>
                    <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 24px;">Loading test history...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <a href="/dashboard">
        <button class="btn btn-secondary">Back to Dashboard</button>
    </a>
</div>

<script src="/responsive.js?v=2.3"></script>
<script>
async function loadHistory() {
    try {
        const response = await fetch("/history-data");
        if (!response.ok) throw new Error("Unauthorized");
        const results = await response.json();

        let html = "";
        if (!results || results.length === 0) {
            html = `<tr><td colspan="5" style="text-align:center; color: var(--text-muted); padding: 24px;">No test history found. Complete a test to see your performance here!</td></tr>`;
        } else {
            results.forEach((result, index) => {
                const pct = result.percentage || Math.round((result.score / result.totalQuestions) * 100) || 0;
                let pctColor = "var(--primary)";
                if (pct >= 80) pctColor = "var(--success)";
                else if (pct < 50) pctColor = "var(--error)";

                html += `
                <tr>
                    <td style="font-weight: 600;">${index + 1}</td>
                    <td><strong>${result.score}</strong></td>
                    <td>${result.totalQuestions}</td>
                    <td><span style="font-weight: 700; color: ${pctColor};">${pct}%</span></td>
                    <td>${new Date(result.createdAt).toLocaleDateString()} ${new Date(result.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                </tr>
                `;
            });
        }

        document.getElementById("historyTable").innerHTML = html;
    } catch (e) {
        console.error(e);
        document.getElementById("historyTable").innerHTML = `<tr><td colspan="5" style="text-align:center; color: red; padding: 24px;">Failed to load test history.</td></tr>`;
    }
}

loadHistory();
</script>
</body>
</html>
