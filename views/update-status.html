<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Application Status | Admin Console</title>
    <link rel="stylesheet" href="/dashboard.css">
    <link rel="stylesheet" href="/admin-dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/responsive.css">
</head>
<body>

<!-- Navigation Bar -->
<nav>
    <div class="logo">
        🚀 Placement Portal
    </div>
    <ul>
        <li><a href="/admin-dashboard">Dashboard</a></li>
        <li><a href="/students">Students</a></li>
        <li><a href="/applications">Applications</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</nav>

<div class="container">
    <div style="margin-bottom: 24px; display: flex; flex-direction: column; gap: 8px;">
        <div>
            <a href="/admin-dashboard" style="text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 500;">← Back to Dashboard</a>
            <h1 style="font-size: 28px; font-weight: 700; color: #1e3a8a; margin-top: 8px;">🔄 Update Application Status</h1>
            <p style="color: var(--text-muted); font-size: 14px;">Select, shortlist, or update student applications for registered companies.</p>
        </div>
    </div>

    <!-- Filters Control Bar -->
    <div class="card" style="margin-bottom: 30px; text-align: left; display: flex; gap: 16px; align-items: center; padding: 20px;">
        <div style="flex: 1;">
            <label style="font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px;">Search Applications</label>
            <input type="text" id="search" placeholder="🔍 Search by student name or company..." onkeyup="searchStatusList()" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px;">
        </div>
        <div style="margin-top: 20px;">
            <button class="btn btn-secondary" onclick="resetSearch()" style="padding: 11px 20px; font-size: 13px;">Clear Filter</button>
        </div>
    </div>

    <!-- Update Status Data Table -->
    <div style="background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow-sm);">
        <table style="margin: 0; border: none; box-shadow: none;">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Email</th>
                    <th>Company</th>
                    <th>Select Status</th>
                    <th style="text-align: center;">Action</th>
                </tr>
            </thead>
            <tbody id="statusTable">
                <tr>
                    <td colspan="5" style="text-align: center; color: var(--text-muted);">Loading applications list...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
let applications = [];

async function loadApplications() {
    try {
        const response = await fetch("/applications-data");
        if (!response.ok) throw new Error("Unauthorized");
        applications = await response.json();
        displayApplications(applications);
    } catch (e) {
        console.error(e);
        document.getElementById("statusTable").innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Failed to load applications.</td></tr>';
    }
}

function displayApplications(data) {
    let html = "";
    if (data.length === 0) {
        html = `<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">No student applications found.</td></tr>`;
    } else {
        data.forEach(app => {
            const userName = app.userId ? app.userId.name : "Unknown Student";
            const userEmail = app.userId ? app.userId.email : "N/A";
            const companyName = app.companyId ? app.companyId.companyName : "N/A";
            
            html += `
                <tr>
                    <td style="font-weight: 500;">${userName}</td>
                    <td>${userEmail}</td>
                    <td style="font-weight: 500; color: #1e3a8a;">${companyName}</td>
                    <td>
                        <select id="${app._id}" style="padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: white; width: 100%;">
                            <option value="Applied" ${app.status === "Applied" ? "selected" : ""}>Applied</option>
                            <option value="Shortlisted" ${app.status === "Shortlisted" ? "selected" : ""}>Shortlisted</option>
                            <option value="Interview Scheduled" ${app.status === "Interview Scheduled" ? "selected" : ""}>Interview Scheduled</option>
                            <option value="Selected" ${app.status === "Selected" ? "selected" : ""}>Selected</option>
                            <option value="Rejected" ${app.status === "Rejected" ? "selected" : ""}>Rejected</option>
                        </select>
                    </td>
                    <td style="text-align: center;">
                        <button class="btn btn-primary" onclick="updateStatus('${app._id}')" style="padding: 6px 16px; font-size: 12px;">Save</button>
                    </td>
                </tr>
            `;
        });
    }
    document.getElementById("statusTable").innerHTML = html;
}

async function updateStatus(id) {
    const status = document.getElementById(id).value;
    const saveBtn = document.querySelector(`button[onclick="updateStatus('${id}')"]`);
    saveBtn.disabled = true;
    saveBtn.innerText = "Saving...";

    try {
        const response = await fetch("/update-status", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ id, status })
        });

        const text = await response.text();

        if (response.ok) {
            Swal.fire({
                icon: "success",
                title: "Status Saved!",
                text: "Application state successfully updated in candidate registry.",
                confirmButtonColor: "#3b82f6"
            });
        } else {
            Swal.fire({
                icon: "error",
                title: "Update Failed",
                text: text || "Failed to update candidate status.",
                confirmButtonColor: "#3b82f6"
            });
        }
    } catch (e) {
        console.error(e);
        Swal.fire({
            icon: "error",
            title: "Network Error",
            text: "Could not connect to the server.",
            confirmButtonColor: "#3b82f6"
        });
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = "Save";
    }
}

function searchStatusList() {
    const key = document.getElementById("search").value.toLowerCase();
    const filtered = applications.filter(app => {
        const name = app.userId ? app.userId.name.toLowerCase() : "";
        const email = app.userId ? app.userId.email.toLowerCase() : "";
        const comp = app.companyId ? app.companyId.companyName.toLowerCase() : "";
        return name.includes(key) || email.includes(key) || comp.includes(key);
    });
    displayApplications(filtered);
}

function resetSearch() {
    document.getElementById("search").value = "";
    displayApplications(applications);
}

loadApplications();
</script>

    <script src="/responsive.js"></script>
</body>
</html>
